<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailorFit — Settings</title>
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        font-size: 14px;
        color: #1a1a1a;
        max-width: 720px;
        margin: 24px auto;
        padding: 0 16px;
        line-height: 1.5;
      }
      h1 {
        font-size: 20px;
      }
      label {
        display: block;
        font-weight: 600;
        margin: 18px 0 6px;
      }
      .hint {
        font-weight: 400;
        color: #666;
        font-size: 13px;
      }
      textarea,
      input {
        width: 100%;
        padding: 8px;
        border: 1px solid #d0d0d0;
        border-radius: 6px;
        font: inherit;
        box-sizing: border-box;
      }
      textarea {
        min-height: 320px;
        resize: vertical;
        font-family: ui-monospace, monospace;
        font-size: 13px;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 18px;
      }
      button {
        font: inherit;
        padding: 8px 16px;
        border: none;
        border-radius: 6px;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }
      button.secondary {
        background: #e5e5e5;
        color: #1a1a1a;
      }
      #status {
        color: #15803d;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>TailorFit Settings</h1>
    <p class="hint">
      Stored only on this device in <code>chrome.storage.local</code>. Keys are never
      logged or sent anywhere except the selected provider's API.
    </p>

    <label for="provider">AI provider</label>
    <select id="provider">
      <option value="anthropic">Anthropic (Claude Sonnet)</option>
      <option value="openai">OpenAI (GPT-5.1-mini)</option>
    </select>

    <div id="anthropic-key-section">
      <label for="apiKey">
        Anthropic API key <span class="hint">— starts with <code>sk-ant-</code></span>
      </label>
      <input id="apiKey" type="password" placeholder="sk-ant-…" autocomplete="off" />
      <div class="row">
        <button id="toggleKey" class="secondary" type="button">Show key</button>
      </div>
    </div>

    <div id="openai-key-section" style="display:none">
      <label for="openaiApiKey">
        OpenAI API key <span class="hint">— starts with <code>sk-</code></span>
      </label>
      <input id="openaiApiKey" type="password" placeholder="sk-…" autocomplete="off" />
      <div class="row">
        <button id="toggleOpenaiKey" class="secondary" type="button">Show key</button>
      </div>
    </div>

    <label for="masterResume">
      Master resume
      <span class="hint">— your full, truthful resume in plain text</span>
    </label>
    <textarea
      id="masterResume"
      placeholder="Paste your complete master resume here…"
    ></textarea>

    <label for="pinnedSkills">
      Always-include skills
      <span class="hint">— comma-separated; merged into the AI/ML skills line every run. Only list skills you genuinely have.</span>
    </label>
    <input id="pinnedSkills" type="text" placeholder="GenAI, Claude Code, RAG, MCP, Pinecone, Redis" />

    <label for="contactLinks">
      Profile links
      <span class="hint">— one per line, format <code>Label: URL</code>. Injected into the contact line.</span>
    </label>
    <textarea id="contactLinks" placeholder="LinkedIn: https://www.linkedin.com/in/you&#10;GitHub: https://github.com/you"></textarea>

    <label for="entryLinks">
      Project / entry links
      <span class="hint">— one per line, format <code>keyword = URL</code>. Keyword matches a project/job heading.</span>
    </label>
    <textarea id="entryLinks" placeholder="HR Copilot = https://github.com/you/repo&#10;Daily Learning = https://github.com/you/repo2"></textarea>

    <div class="row">
      <button id="save" type="button">Save</button>
      <span id="status"></span>
    </div>

    <script src="options.js"></script>
  </body>
</html>
